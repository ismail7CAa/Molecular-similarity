name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint and Test
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
      MPLCONFIGDIR: /tmp/matplotlib

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          fi

          if [[ -f requirements-dev.txt ]]; then
            pip install -r requirements-dev.txt
          fi

          if [[ -f pyproject.toml ]]; then
            pip install -e .[dev] || pip install -e .
          fi

      - name: Run Ruff
        shell: bash
        run: |
          set -euo pipefail
          if python -m pip show ruff >/dev/null 2>&1; then
            python -m ruff check src scripts tests
          else
            echo "Ruff is not installed yet; skipping lint step."
          fi

      - name: Run pytest
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d tests ]]; then
            python -m pytest
          else
            echo "No tests directory found yet; skipping test step."
          fi

  cd:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      MPLBACKEND: Agg
      MPLCONFIGDIR: /tmp/matplotlib

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distribution
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build

          if [[ ! -f pyproject.toml ]]; then
            echo "pyproject.toml is required to build release artifacts."
            exit 1
          fi

          python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: molecular-similarity-dist
          path: dist/
